<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PROCEDER:HUB_SEO -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css-shared/tokens.css">
  <link rel="stylesheet" href="/assets/css-shared/base.css">
  <link rel="stylesheet" href="/assets/css-shared/components.css">
  <link rel="stylesheet" href="/assets/css-shared/pages/editorial-index.css">
  <link rel="stylesheet" href="/assets/css-shared/proceder-shell.css">
  <style>
    :root{--azul:#060D1E;--azul2:#061E47;--dourado:#C9A84C;--branco:#F7F3EA}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,var(--azul),var(--azul2));color:var(--branco);font-family:'Lato',sans-serif;min-height:100vh}a{color:inherit;text-decoration:none}
    
    main{max-width:1080px;margin:auto;padding:54px 24px 90px}.breadcrumbs{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.42);margin-bottom:48px}.breadcrumbs a{color:var(--dourado)}.breadcrumbs span{margin:0 9px}
    .hero{max-width:820px;margin-bottom:58px}.label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dourado)}h1{font-family:'Playfair Display',serif;font-size:clamp(38px,7vw,68px);line-height:1.04;margin:16px 0 22px}.description{font-family:'Playfair Display',serif;font-size:clamp(18px,3vw,24px);line-height:1.55;color:rgba(255,255,255,.72);margin:0 0 22px}.intro{font-size:15px;line-height:1.85;color:rgba(255,255,255,.5);max-width:760px}
    .section-head{display:flex;justify-content:space-between;align-items:end;border-bottom:1px solid rgba(201,168,76,.2);padding-bottom:13px;margin-bottom:24px}.section-head h2{font-family:'Playfair Display',serif;font-size:26px;margin:0}.count{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dourado)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:21px}.card{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;transition:transform .22s,border-color .22s}.card:hover{transform:translateY(-3px);border-color:rgba(201,168,76,.48)}.card img{width:100%;height:160px;object-fit:cover;background:#061226}.card-body{padding:18px;display:flex;flex-direction:column;flex:1}.card-tag{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--dourado);text-transform:uppercase;margin-bottom:9px}.card h3{font-family:'Playfair Display',serif;font-size:17px;line-height:1.38;margin:0 0 9px}.card p{font-size:13px;color:rgba(255,255,255,.45);line-height:1.6;margin:0 0 15px}.card-date{font-size:11px;color:var(--dourado);margin-top:auto}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:650px){.grid{grid-template-columns:1fr}main{padding:40px 16px 70px}.breadcrumbs{margin-bottom:36px}}
  </style>
</head>
<body>
  <!-- PROCEDER:HUB_GENERATED -->
  <!-- PROCEDER:SHELL_HEADER -->
  <main class="pf-main">
    <!-- PROCEDER:HUB_CONTENT -->
  </main>
  <!-- PROCEDER:SHELL_FOOTER -->
</body>
</html>
