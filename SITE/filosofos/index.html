<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filósofos | Proceder Filosófico</title>
  <meta name="description" content="Explore filósofos e sofistas por período histórico na biblioteca do Proceder Filosófico.">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <link rel="canonical" href="https://procederfilosofico.com.br/filosofos/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root{--azul:#060D1E;--azul2:#061E47;--dourado:#C9A84C;--dourado2:#E6D28A;--branco:#F7F3EA;--cinza:#B8B3A8}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,var(--azul),var(--azul2));color:var(--branco);font-family:'Lato',sans-serif;min-height:100vh}a{color:inherit;text-decoration:none}
    .navbar{position:sticky;top:0;z-index:20;background:rgba(6,30,71,.98);border-bottom:1px solid rgba(201,168,76,.16)}.navbar-inner{max-width:1200px;margin:auto;padding:15px 24px;display:flex;align-items:center;justify-content:space-between;gap:24px}.logo{display:flex;align-items:center;gap:12px;font-family:'Cinzel',serif;font-size:14px;letter-spacing:.08em}.logo img{width:38px;height:38px;object-fit:contain}.nav{display:flex;gap:22px;align-items:center;font-size:12px;text-transform:uppercase;letter-spacing:.08em}.nav a:hover,.nav .active{color:var(--dourado)}.menu-toggle{display:none;background:none;border:1px solid rgba(201,168,76,.35);color:var(--dourado);border-radius:5px;padding:8px 11px;font-family:'Cinzel',serif;font-size:11px}
    main{max-width:1120px;margin:auto;padding:72px 24px 90px}.page-head{text-align:center;margin-bottom:46px}.label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dourado);display:block;margin-bottom:14px}.page-head h1{font-family:'Playfair Display',serif;font-size:clamp(34px,6vw,58px);line-height:1.05;margin:0 0 16px}.page-head p{max-width:660px;margin:auto;color:rgba(255,255,255,.5);line-height:1.75}
    .search-wrap{max-width:620px;margin:0 auto 54px}.search{width:100%;padding:15px 18px;border:1px solid rgba(201,168,76,.28);border-radius:7px;background:rgba(255,255,255,.04);color:#fff;font:inherit;outline:none}.search:focus{border-color:var(--dourado)}.search::placeholder{color:rgba(255,255,255,.32)}
    .period{margin-bottom:58px}.period-head{display:flex;align-items:end;justify-content:space-between;gap:18px;border-bottom:1px solid rgba(201,168,76,.2);padding-bottom:13px;margin-bottom:24px}.period h2{font-family:'Playfair Display',serif;font-size:25px;margin:0}.period-count{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;color:var(--dourado);text-transform:uppercase}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:22px}.card{background:rgba(255,255,255,.035);border:1px solid rgba(201,168,76,.16);border-radius:9px;padding:22px;text-align:center;transition:transform .22s,border-color .22s}.card:hover{transform:translateY(-4px);border-color:rgba(201,168,76,.55)}.portrait{width:105px;height:105px;border-radius:50%;margin:0 auto 17px;overflow:hidden;border:2px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#0d1930,#060D1E);font-family:'Playfair Display',serif;font-size:32px;color:rgba(201,168,76,.42)}.portrait img{width:100%;height:100%;object-fit:cover;object-position:top}.name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700}.dates{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dourado);margin:7px 0 11px}.bio{font-size:13px;line-height:1.65;color:rgba(255,255,255,.46);margin:0}.bio p{margin:0}.empty{text-align:center;color:rgba(255,255,255,.4);padding:40px}
    footer{text-align:center;padding:30px 24px;border-top:1px solid rgba(201,168,76,.12);color:rgba(255,255,255,.35);font-size:12px}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:650px){.navbar-inner{padding:13px 16px;position:relative}.logo span{display:none}.menu-toggle{display:block}.nav{display:none;position:absolute;top:100%;left:0;right:0;background:#061E47;border-bottom:1px solid rgba(201,168,76,.2);padding:16px;flex-direction:column;align-items:stretch;gap:0}.nav.open{display:flex}.nav a{padding:11px 8px;border-bottom:1px solid rgba(255,255,255,.06)}main{padding:50px 16px 70px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="logo" href="/"><img src="/assets/LQHqVnilFspwfHEy.png" alt="Proceder Filosófico"><span>Proceder Filosófico</span></a>
      <button class="menu-toggle" id="menuToggle" type="button" aria-expanded="false" aria-controls="libraryNav">Menu</button>
      <div class="nav" id="libraryNav"><a href="/">Início</a><a href="/conteudo/">Conteúdo</a><a class="active" href="/filosofos/">Filósofos</a><a href="/sobre/">Sobre</a><a href="/artigos/">Artigos</a><a href="/#newsletter">Newsletter</a><a href="/biblioteca.html">Livros</a><a href="/#newsletter">Assinar</a></div>
    </div>
  </nav>
  <main>
    <header class="page-head">
      <span class="label">Biblioteca Filosófica</span>
      <h1>Filósofos</h1>
      <p>Uma navegação histórica pelos autores que formularam as perguntas fundamentais da tradição filosófica.</p>
    </header>
    <div class="search-wrap"><input class="search" id="philosopherSearch" type="search" placeholder="Buscar filósofo, período ou corrente..." aria-label="Buscar filósofos"></div>
    <div id="periods"></div>
  </main>
  <footer>Proceder Filosófico · Biblioteca de pensamento</footer>
  <script type="module">
    import { philosophers } from '/src/data/philosophers.js';

    var allowed = philosophers;
    var groups = ['Filósofos','Sofistas','Poetas','Dramaturgos','Historiadores','Escritores','Sociólogos','Artistas'];

    function periodOf(value){
      var text=String(value||'');
      if(text.indexOf('a.C.')>=0) return 'Antiguidade';
      var years=(text.match(/\d{3,4}/g)||[]).map(Number);
      var first=years[0]||1900;
      if(first<1500) return 'Idade Média';
      if(first<1800) return 'Modernidade';
      return 'Contemporaneidade';
    }
    function plain(html){var box=document.createElement('div');box.innerHTML=html||'';return box.textContent||''}
    function render(query){
      var term=String(query||'').trim().toLocaleLowerCase('pt-BR');
      var filtered=allowed.filter(function(person){
        return !term||[person.nome,person.periodo,person.categoria,person.corrente,periodOf(person.periodo),plain(person.bio)].join(' ').toLocaleLowerCase('pt-BR').indexOf(term)>=0;
      });
      var root=document.getElementById('periods');root.innerHTML='';
      groups.forEach(function(groupName){
        var people=filtered.filter(function(person){return person.categoria===groupName});
        if(!people.length)return;
        var section=document.createElement('section');section.className='period';
        section.innerHTML='<div class="period-head"><h2>'+groupName+'</h2><span class="period-count">'+people.length+' '+(people.length===1?'nome':'nomes')+'</span></div><div class="grid"></div>';
        var grid=section.querySelector('.grid');
        people.forEach(function(person){
          var card=document.createElement('article');card.className='card';
          var portrait=person.img?'<img src="/'+person.img.replace(/^\/+/,'')+'" alt="'+person.nome+'" loading="lazy" onerror="this.parentNode.textContent=&quot;'+person.nome.charAt(0)+'&quot;">':person.nome.charAt(0);
          card.innerHTML='<div class="portrait">'+portrait+'</div><div class="name">'+person.nome+'</div><div class="dates">'+person.periodo+' · '+(person.corrente||person.categoria)+'</div><div class="bio">'+person.bio+'</div>';
          grid.appendChild(card);
        });
        root.appendChild(section);
      });
      if(!root.children.length)root.innerHTML='<p class="empty">Nenhum filósofo encontrado.</p>';
    }
    document.getElementById('philosopherSearch').addEventListener('input',function(){render(this.value)});
    document.getElementById('menuToggle').addEventListener('click',function(){var nav=document.getElementById('libraryNav'),open=nav.classList.toggle('open');this.setAttribute('aria-expanded',String(open))});
    render('');
  </script>
</body>
</html>
